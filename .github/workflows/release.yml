name: Release

on:
    push:
        tags:
            - "v*"

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Generate Release Notes
              id: release-notes
              run: |
                  # 生成版本对比链接
                  PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -A1 "${{ github.ref_name }}" | tail -n1)
                  if [ -n "$PREV_TAG" ]; then
                    COMPARE_URL="${{ github.event.repository.html_url }}/compare/${PREV_TAG}...${{ github.ref_name }}"
                    echo "compare_url=${COMPARE_URL}" >> "$GITHUB_OUTPUT"
                  fi

                  # 生成变更日志
                  RELEASE_NOTES="## 📋 版本说明\n\n"

                  if [ -n "$COMPARE_URL" ]; then
                    RELEASE_NOTES+="📈 [查看变更对比]($COMPARE_URL)\n\n"
                  fi

                  # 获取当前标签之后的提交（按类型分组）
                  if [ -n "$PREV_TAG" ]; then
                    COMMITS=$(git log --oneline "$PREV_TAG"..HEAD)
                  else
                    COMMITS=$(git log --oneline)
                  fi

                  # 定义类型分类
                  declare -A CATEGORIES=(
                    ["feat"]="✨ 新功能"
                    ["fix"]="🐛 Bug 修复"
                    ["docs"]="📝 文档更新"
                    ["refactor"]="🔧 代码重构"
                    ["perf"]="⚡ 性能优化"
                    ["test"]="🧪 测试"
                    ["chore"]="🔨 构建/工具"
                    ["style"]="🎨 代码风格"
                  )

                  # 初始化分类数组
                  for TYPE in "${!CATEGORIES[@]}"; do
                    declare -a "${TYPE}_COMMITS"=()
                  done

                  # 解析提交并分类
                  while IFS= read -r COMMIT; do
                    # 提取类型和描述
                    TYPE=$(echo "$COMMIT" | sed -n 's/^[^ ]* \([a-z]*\)\([(].*[)]\)\?: .*/\1/p')
                    DESCRIPTION=$(echo "$COMMIT" | sed 's/^[^ ]* \([a-z]*\)\([(].*[)]\)\?: //')
                    SCOPE=$(echo "$COMMIT" | sed -n 's/^[^ ]* [a-z]*\(\([(].*[)]\)\)\?: .*/\1/p')
                    
                    if [ -n "$TYPE" ] && [[ " ${!CATEGORIES[@]} " =~ " $TYPE " ]]; then
                      if [ -n "$SCOPE" ]; then
                        eval "${TYPE}_COMMITS+=(\"- **${SCOPE}** ${DESCRIPTION}\")"
                      else
                        eval "${TYPE}_COMMITS+=(\"- ${DESCRIPTION}\")"
                      fi
                    fi
                  done <<< "$COMMITS"

                  # 生成分类输出
                  for TYPE in feat fix docs refactor perf test chore style; do
                    COUNT=$(eval "echo \${#${TYPE}_COMMITS[@]}")
                    if [ "$COUNT" -gt 0 ]; then
                      RELEASE_NOTES+="${CATEGORIES[$TYPE]}\n\n"
                      eval "printf '%s\\n' \"\${${TYPE}_COMMITS[@]}\" >> /tmp/commits.txt"
                      while IFS= read -r LINE; do
                        RELEASE_NOTES+="$LINE\n"
                      done < /tmp/commits.txt
                      RELEASE_NOTES+="\n"
                    fi
                  done

                  RELEASE_NOTES+="---\n\n🚀 发布于 $(date +'%Y/%m/%d')\n"

                  # 输出到文件
                  echo -e "$RELEASE_NOTES" > /tmp/release_notes.md
                  cat /tmp/release_notes.md

                  # 设置输出变量
                  RELEASE_NOTES_ESCAPED=$(cat /tmp/release_notes.md | sed 's/%/%25/g; s/\n/%0A/g; s/\r/%0D/g')
                  echo "notes<<EOF" >> "$GITHUB_OUTPUT"
                  cat /tmp/release_notes.md >> "$GITHUB_OUTPUT"
                  echo "EOF" >> "$GITHUB_OUTPUT"

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  name: ${{ github.ref_name }}
                  body_path: /tmp/release_notes.md
                  draft: false
                  prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
