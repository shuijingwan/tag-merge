services:
  go:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: 1000
        USER_GID: 1000
    container_name: tag-merge
    working_dir: /code
    volumes:
      - ./:/code
      - ~/.gitconfig:/home/vscode/.gitconfig:ro
      - ~/go/pkg/mod-tag-merge:/go/pkg/mod
      - ~/go/build-cache-tag-merge:/home/vscode/.cache/go-build
    tty: true
    stdin_open: true
    environment:
      - GOPROXY=https://goproxy.cn,direct
      - GOSUMDB=sum.golang.google.cn
      - CGO_ENABLED=0
      # 使用 ${} 语法从 .env 文件中读取，不要在这里写明文密钥
      - BAIDU_APP_ID=${BAIDU_APP_ID}
      - BAIDU_SECRET_KEY=${BAIDU_SECRET_KEY}